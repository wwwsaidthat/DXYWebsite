<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Preview Frame</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        background: #f3fbf6;
        display: grid;
        place-items: start center;
        padding-top: 0;
      }
      .frame {
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
        background: #f3fbf6;
      }
      .shot {
        width: 1440px;
        height: 900px;
        position: absolute;
        left: 240px;
        top: 90px;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <img class="shot" src="./after-home-1440.png" alt="home 1440" />
    </div>
  </body>
</html>
